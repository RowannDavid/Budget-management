grails:
    profile: rest-api # Changé de 'web' à 'rest-api' pour une API pure
    codegen:
        defaultPackage: backend
    gorm:
        reactor:
            events: false
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
spring:
    jmx:
        unique-names: true
    main:
        banner-mode: "off"
    groovy:
        template:
            check-template-location: false
    devtools:
        restart:
            additional-exclude:
                - '*.gsp'
                - '**/*.gsp'
                - '*.gson'
                - '**/*.gson'
                - 'logback-spring.xml'
                - '*.properties'

---
grails:
    cors:
        enabled: true
    mime:
        disable:
            accept:
                header:
                    userAgents:
                        - Gecko
                        - WebKit
                        - Presto
                        - Trident
        types:
            json:
                - application/json
                - text/json
            hal:
                - application/hal+json
                - application/hal+xml
            xml:
                - text/xml
                - application/xml
    urlmapping:
        cache:
            maxsize: 1000
    controllers:
        defaultScope: singleton
    converters:
        encoding: UTF-8
    views:
        # Pour une API, on privilégie souvent JSON views (.gson)
        json:
            generator:
                compact: true

---
hibernate:
    cache:
        queries: false
        use_second_level_cache: false
        use_query_cache: false
    # Utilisation du dialecte spécifique à PostgreSQL
    dialect: org.hibernate.dialect.PostgreSQLDialect

dataSource:
    pooled: true
    jmxEnabled: true
    driverClassName: org.postgresql.Driver
    username: eli
    password: '1234'

environments:
    development:
        dataSource:
            dbCreate: update # 'update' est plus sûr que 'create-drop' pour ne pas perdre vos données de test à chaque reboot
            url: jdbc:postgresql://localhost:5432/budget_manager_db
    test:
        dataSource:
            dbCreate: update
            url: jdbc:postgresql://localhost:5432/budget_manager_db
    production:
        dataSource:
            dbCreate: none # En prod, on utilise des migrations (Liquibase/Flyway)
            url: jdbc:postgresql://localhost:5432/budget_manager_db
            properties:
                initialSize: 5
                maxActive: 50
                minIdle: 5
                maxIdle: 25
                maxWait: 10000
                maxAge: 600000
                timeBetweenEvictionRunsMillis: 5000
                minEvictableIdleTimeMillis: 60000
                validationQuery: SELECT 1
                validationQueryTimeout: 3
                validationInterval: 15000
                testOnBorrow: true
                testWhileIdle: true
                testOnReturn: false
                jdbcInterceptors: ConnectionState
                defaultTransactionIsolation: 2

jwt:
    secret: 'my_super_secret_jwt_key_budget_manager_2026'